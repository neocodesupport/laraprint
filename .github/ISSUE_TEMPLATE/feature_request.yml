name: ✨ Demande de fonctionnalité
description: Proposer une amélioration ou une nouvelle fonctionnalité
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problème / besoin
      description: Quel problème cette fonctionnalité résout-elle ?
      placeholder: J'aimerais pouvoir…
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Solution envisagée
      description: Décrivez le comportement ou l'API souhaités.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives envisagées
  - type: textarea
    id: context
    attributes:
      label: Contexte additionnel
      description: Type d'imprimante, plateforme, cas d'usage, exemples de code…
